name: Build aios-install release binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'
          cache: true

      - name: Validate source
        run: |
          set -euo pipefail
          bash -n install.sh
          go test ./...
          go vet ./...
          python3 -m py_compile scripts/aios.py scripts/audit_public.py scripts/translate_docs.py scripts/export_translation_secrets.py
          python3 scripts/audit_public.py

      - name: Build cross-platform archives
        run: scripts/build_aios_install_release.sh dist/aios-install

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: aios-install-release-assets
          path: dist/aios-install/*

      - name: Publish GitHub Release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/aios-install/*
