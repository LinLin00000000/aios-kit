name: aios-kit
version: 0.2.0
description: Portable AIOS kit base skillpack. Machine-specific/local skills belong in skillpack.local.yaml.

defaults:
  scope: global
  agent: universal
  mode: copy
  state_dir: ~/aios/vault/ops/state/aios-kit

external:
  - id: docx
    source: anthropics/skills
    skill: docx
    enabled: true
    reason: Document creation/inspection baseline.
  - id: pptx
    source: anthropics/skills
    skill: pptx
    enabled: true
    reason: Presentation creation/inspection baseline.
  - id: xlsx
    source: anthropics/skills
    skill: xlsx
    enabled: true
    reason: Spreadsheet workflows.
  - id: pdf
    source: openai/skills
    skill: pdf
    enabled: true
    reason: PDF reading/review workflows.
  - id: find-skills
    source: vercel-labs/skills
    skill: find-skills
    enabled: true
    reason: Discover/install additional agent skills.
  - id: skill-creator
    source: anthropics/skills
    skill: skill-creator
    enabled: true
    reason: Author and improve reusable skills.
  - id: awesome-mcp-servers-discovery
    source: aradotso/mcp-skills
    skill: awesome-mcp-servers-discovery
    enabled: true
    reason: MCP server discovery.
  - id: frontend-design
    source: https://github.com/anthropics/skills
    skill: frontend-design
    enabled: true
    reason: Frontend design guidance for UI/product work.
  - id: ui-ux-pro-max
    source: https://github.com/nextlevelbuilder/ui-ux-pro-max-skill
    skill: ui-ux-pro-max
    enabled: true
    reason: Advanced UI/UX design review and improvement guidance.
  - id: vercel-composition-patterns
    source: https://github.com/vercel-labs/agent-skills
    skill: vercel-composition-patterns
    enabled: true
    reason: Vercel app/component composition patterns.
  - id: web-design-guidelines
    source: https://github.com/vercel-labs/agent-skills
    skill: web-design-guidelines
    enabled: true
    reason: Web design guidelines for modern frontend work.

first_party:
  - id: aios-resource-resolver
    path: skills/aios-resource-resolver
    source: LinLin00000000/aios-kit
    skill: aios-resource-resolver
    enabled: true
    default_mode: copy
    targets: universal
    reason: Thin AIOS resource/context resolver skill. Facts live in registries, not in the skill.
  - id: lins-living-loop
    path: ~/aios/modules/lins-living-loop
    source: LinLin00000000/lins-living-loop
    skill: lins-living-loop
    enabled: true
    default_mode: copy
    targets: universal
    reason: File-backed long-running workflow skill, maintained as an independent first-party project.
  - id: github-repo-search
    path: skills/github-repo-search
    source: LinLin00000000/aios-kit
    skill: github-repo-search
    enabled: true
    default_mode: copy
    targets: universal
    reason: Lin-customized GitHub project discovery and comparison skill; AIOS repo is the truth source.
