# Mihomo 策略配置（非敏感，可提交/可交给 Agent）
#
# provider 清单、顺序和订阅 URL 不写在这里；它们属于 secrets/.env 或 AIOS Secret Runtime。
# 如果某个 group 不写 providers，就默认使用 MIHOMO_PROVIDERS_ORDER。

[defaults]
# 生成基础 PROXY / Auto / GLOBAL 分组。
base_proxy = true
# 生成基础规则；自定义规则可通过 [rules].prepend 放到前面。
base_rules = true
# 生成配置是否默认开启 TUN。AIOS Kit 默认开启；私有/本地 overlay 可设为 false。
tun_enable = true

# 可选策略组示例：AI 流量使用单独分组。
# tiered-url-test 会先在每个 provider 内 url-test，再按 provider 顺序 fallback。
[[groups]]
name = "AI"
strategy = "tiered-url-test"
type = "url-test"
url = "http://www.gstatic.com/generate_204"
interval = 300
tolerance = 100
lazy = true
exclude-filter = '(?i)hong kong|hk|macao|macau|taiwan|tw|expire|remaining|剩余|到期|距离'

[rules]
prepend = [
  "GEOSITE,ai,AI",
]
