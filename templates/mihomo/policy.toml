# Mihomo 策略配置（非敏感，可提交/可交给 Agent）
#
# provider 清单、顺序和订阅 URL 不写在这里；它们属于 secrets/.env 或 AIOS Secret Runtime。
# 如果某个 group 不写 providers，就默认使用 MIHOMO_PROVIDERS_ORDER。

[defaults]
# 生成基础 General / General-Auto / GLOBAL 分组。
base_proxy = true
# 生成基础规则；自定义规则可通过 [rules].prepend 放到前面。
base_rules = true
# 生成配置是否默认开启 TUN。AIOS Kit 默认开启；私有/本地 overlay 可设为 false。
tun_enable = true

# 可选策略组示例：AI 流量使用单独分组。
# tiered-url-test 会生成 ${NAME}-Auto fallback 和 ${NAME} select 两层。
[[groups]]
name = "AI"
strategy = "tiered-url-test"
type = "url-test"
url = "http://www.gstatic.com/generate_204"
interval = 300
tolerance = 100
lazy = true
exclude-filter = "(?i)香港|hong kong|hong|hk|港|澳门|macao|macau|澳|台湾|taiwan|tw|台|expire|remaining|剩余|到期|距离"

[rules]
# 规则引擎模式：
# - geox: 使用 geosite.dat / geoip.dat，文件少，适合 AIOS Kit 网络引导默认值。
# - rule-set: 使用 DustinWin mihomo-ruleset 的 MRS/list 规则，分类更细，适合日常长期配置。
mode = "geox"
prepend = []
append = []
